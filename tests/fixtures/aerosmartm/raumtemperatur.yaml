    # Temperatur Raumluft
  - name: aerosmartm_temp_raumluft
    slave: 1
    address: 200
    input_type: holding
    data_type: uint32
    scale: 0.001
    precision: 1
    unit_of_measurement: "°C"
    state_class: measurement

